name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --config .markdownlint.json

  link-check:
    name: link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.12.2

      - name: Check links
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' file; do
            echo "::group::$file"
            if ! markdown-link-check --quiet --config .github/markdown-link-check.json "$file"; then
              status=1
            fi
            echo "::endgroup::"
          done < <(find . -type f -name '*.md' -not -path './node_modules/*' -print0)
          exit $status
